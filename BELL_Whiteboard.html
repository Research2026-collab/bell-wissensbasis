<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELL 2026 – Wissensbasis Whiteboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1923;
  --surface: #172030;
  --surface2: #1e2d40;
  --border: rgba(255,255,255,0.08);
  --text: #e8e8e4;
  --text-muted: #8a9ab0;
  --text-faint: #4a5a6a;
  --blue: #4a90d9;    --blue-light: #1a3a5c;
  --green: #4caf82;   --green-light: #1a3028;
  --orange: #e0913a;  --orange-light: #2a1e0a;
  --purple: #a47de0;  --purple-light: #281f3a;
  --pink: #d97aa6;    --pink-light: #2a1c24;
  --teal: #4acfcf;    --teal-light: #0f2a2a;
  --gray: #8a9ab0;    --gray-light: #20293a;
  --radius: 12px;
  --radius-sm: 8px;
}
body {
  font-family: -apple-system, Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 1.5rem;
}
.top {
  display: flex; align-items: flex-start;
  justify-content: space-between; margin-bottom: 1.25rem;
  flex-wrap: wrap; gap: 0.75rem;
}
.top-left h1 { font-size: 20px; font-weight: 500; margin-bottom: 0.25rem; }
.top-left p { font-size: 12px; color: var(--text-muted); }
.top-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
.live-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.admin-badge {
  font-size: 11px; font-weight: 600; padding: 0.2rem 0.6rem;
  border-radius: 20px; background: var(--orange-light); color: var(--orange);
  letter-spacing: 0.05em; display: none;
}
.admin-badge.visible { display: inline-block; }

.tabs-wrap { margin-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); padding-bottom: 0.75rem; }
.tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.tab {
  font-family: inherit; font-size: 12px; font-weight: 500;
  color: var(--text-muted); background: var(--surface);
  border: 0.5px solid var(--border); border-radius: 20px;
  padding: 0.4rem 0.95rem; cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.tab:hover { color: var(--text); border-color: var(--text-faint); }
.tab.active { color: var(--bg); background: var(--blue); border-color: var(--blue); font-weight: 600; }

/* Column layout for grouping tabs */
.columns { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 1rem; align-items: start; }
.column { display: flex; flex-direction: column; gap: 0.65rem; }
.column-header {
  font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  padding: 0.55rem 0.85rem; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: space-between;
}
.column-header .count { font-size: 11px; font-weight: 400; opacity: 0.7; }

/* Single-item tabs: masonry-style grid */
.cards-grid { columns: 300px; gap: 0.75rem; }
.cards-grid .card { break-inside: avoid; margin-bottom: 0.75rem; }

/* Card base */
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadein 0.35s ease;
}
@keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

.card-head {
  padding: 0.85rem 1rem 0.6rem;
  border-bottom: 0.5px solid var(--border);
}
.card-project { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
.card-meta { font-size: 11px; color: var(--text-faint); }
.card-body { padding: 0.75rem 1rem; font-size: 13px; line-height: 1.65; color: var(--text-muted); }
.card-contact {
  padding: 0.6rem 1rem;
  border-top: 0.5px solid var(--border);
  font-size: 11px; color: var(--text-faint); line-height: 1.7;
}
.card-contact a { color: var(--blue); text-decoration: none; }
.card-contact a:hover { text-decoration: underline; }
.contact-hidden { font-size: 11px; color: var(--text-faint); padding: 0.5rem 1rem; border-top: 0.5px solid var(--border); font-style: italic; }

.tags { display: flex; flex-wrap: wrap; gap: 0.3rem; padding: 0 1rem 0.6rem; }
.tag { font-size: 10px; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 20px; letter-spacing: 0.03em; }

/* Column accent borders */
.col-blue   .card { border-left: 3px solid var(--blue); }
.col-green  .card { border-left: 3px solid var(--green); }
.col-orange .card { border-left: 3px solid var(--orange); }
.col-purple .card { border-left: 3px solid var(--purple); }
.col-pink   .card { border-left: 3px solid var(--pink); }
.col-teal   .card { border-left: 3px solid var(--teal); }
.col-gray   .card { border-left: 3px solid var(--gray); }

.col-blue   .column-header { background: var(--blue-light);   color: var(--blue); }
.col-green  .column-header { background: var(--green-light);  color: var(--green); }
.col-orange .column-header { background: var(--orange-light); color: var(--orange); }
.col-purple .column-header { background: var(--purple-light); color: var(--purple); }
.col-pink   .column-header { background: var(--pink-light);   color: var(--pink); }
.col-teal   .column-header { background: var(--teal-light);   color: var(--teal); }
.col-gray   .column-header { background: var(--gray-light);   color: var(--gray); }

/* Single-item tab accent */
.accent-green  .card { border-left: 3px solid var(--green); }
.accent-orange .card { border-left: 3px solid var(--orange); }
.accent-purple .card { border-left: 3px solid var(--purple); }
.accent-blue   .card { border-left: 3px solid var(--blue); }
.accent-pink   .card { border-left: 3px solid var(--pink); }
.accent-teal   .card { border-left: 3px solid var(--teal); }

.empty { text-align: center; color: var(--text-faint); padding: 4rem 0; font-size: 14px; }
</style>
</head>
<body>

<div class="top">
  <div class="top-left">
    <h1>BELL 2026 – Wissensbasis</h1>
    <p>Gemeinsame Übersicht der teilnehmenden Projekte · Jahreskonferenz BELL, 16.–17.11.2026, Hannover</p>
  </div>
  <div class="top-right">
    <span class="admin-badge" id="adminBadge">Admin-Modus</span>
    <div class="live-dot">
      <div class="dot"></div>
      <span id="livetext">Wird geladen…</span>
    </div>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="themen">Thematische Einordnung</button>
    <button class="tab" data-tab="zielgruppe">Zielgruppe</button>
    <button class="tab" data-tab="region">Region</button>
    <button class="tab" data-tab="stand">Programmlinie</button>
    <button class="tab" data-tab="fokus">Fokus</button>
    <button class="tab" data-tab="begeisterung">Was begeistert mich</button>
    <button class="tab" data-tab="veraenderung">Mehrwert bisher</button>
    <button class="tab" data-tab="veraenderungZiel">Wirkung am Projektende</button>
    <button class="tab" data-tab="gelingen">Gelingensfaktoren</button>
    <button class="tab" data-tab="hindernisse">Hemmende Faktoren</button>
    <button class="tab" data-tab="geheimtipp">Geheimtipps</button>
    <button class="tab" data-tab="suche">Wonach suche ich</button>
    <button class="tab" data-tab="biete">Was ich anbiete</button>
    <button class="tab" data-tab="uebersicht">Übersicht</button>
    <button class="tab" data-tab="kontakte">Kontakte</button>
  </div>
</div>

<div id="board"></div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzt29vNU-riSrLsKJuORybtkdr5SnO9tJwDmzKnTwNXry45Qf9z4wQFf75Zq6p4EzR7VQ/exec';
const ADMIN_PW = 'bellAdmin2026';

const params = new URLSearchParams(window.location.search);
const isAdmin = params.get('admin') === ADMIN_PW;
if (isAdmin) document.getElementById('adminBadge').classList.add('visible');

let daten = [];
let letzterStand = '';
let activeTab = 'themen';

const THEMEN_DEF = [
  { name: 'Alle Themen/keine Festlegung',    color: 'blue'   },
  { name: 'Bildung fürs Engagement',         color: 'green'  },
  { name: 'Digitale Kompetenzentwicklung',   color: 'orange' },
  { name: 'Finanzbildung',                   color: 'purple' },
  { name: 'Gesundheitsbildung',              color: 'pink'   },
  { name: 'Kulturelle Bildung',              color: 'teal'   },
  { name: 'Politische Bildung',              color: 'gray'   },
  { name: 'Sprachenlernen Deutsch',          color: 'blue'   },
  { name: 'Umweltbildung / Nachhaltigkeit',  color: 'green'  },
  { name: 'Sonstiges',                       color: 'gray'   },
];
const ZG_DEF = [
  { name: 'Alle Älteren',                                                            color: 'blue'   },
  { name: 'Menschen mit Einwanderungsgeschichte',                                     color: 'green'  },
  { name: 'Ältere Beschäftigte',                                                      color: 'orange' },
  { name: 'Menschen mit Behinderung / Einschränkungen',                               color: 'purple' },
  { name: 'Ältere in institutionellen Wohnformen',                                    color: 'pink'   },
  { name: 'Ressourcenarme Ältere (geringe formale Bildung, geringes Einkommen, wenig Kontakte)', color: 'teal' },
  { name: 'Menschen im Übergang (in die Nachberuflichkeit)',                          color: 'gray'   },
  { name: 'Sonstiges',                                                                color: 'gray'   },
];
const PROGRAMMLINIE_LABELS = { AB: 'AB – allgemeine breite Projekte', BC: 'BC – Spezialprojekte' };
const COLOR_CYCLE = ['blue','green','orange','purple','pink','teal','gray'];

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    render();
  });
});

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function list(s) {
  return (s||'').split(',').map(v=>v.trim()).filter(Boolean);
}

// ── Card fragments ────────────────────────────────────────────────
function cardHead(e, hideRegion=false) {
  const standLabel = e.stand && PROGRAMMLINIE_LABELS[e.stand.trim()] ? PROGRAMMLINIE_LABELS[e.stand.trim()] : (e.stand || '');
  const stand = standLabel ? ` · ${esc(standLabel)}` : '';
  const meta = hideRegion
    ? (standLabel ? esc(standLabel) : '')
    : `${esc(e.region)||'Region nicht angegeben'}${stand}`;
  const geschlecht = e.geschlecht && e.geschlecht.trim() && e.geschlecht.trim() !== 'Offen für alle Geschlechter'
    ? `<span class="tag" style="background:var(--pink-light);color:var(--pink);margin-left:0.4rem;">${esc(e.geschlecht.trim())}</span>`
    : '';
  return `
    <div class="card-head">
      <p class="card-project">${esc(e.projekt)}${geschlecht}</p>
      ${meta ? `<p class="card-meta">${meta}</p>` : ''}
    </div>`;
}

function cardContact(e) {
  // Kontaktdaten erscheinen nur auf dem Kontakte-Tab, nicht auf inhaltlichen Karten
  return '';
}

function cardContactFull(e) {
  const persons = [
    [e.ap1Name, e.ap1Mail],
    [e.ap2Name, e.ap2Mail],
    [e.ap3Name, e.ap3Mail],
  ].filter(([n]) => n);
  if (!persons.length) return '<p style="font-size:12px;color:var(--text-faint);padding:0.5rem 1rem;">Keine Kontaktangaben</p>';
  const lines = persons.map(([n,m]) =>
    m ? `${esc(n)} · <a href="mailto:${esc(m)}">${esc(m)}</a>` : esc(n)
  ).join('<br>');
  return `<div class="card-contact">${lines}</div>`;
}

function makeCard(e, bodyHtml, tagHtml='', hideRegion=false) {
  return `
    <div class="card">
      ${cardHead(e, hideRegion)}
      ${tagHtml}
      <div class="card-body">${bodyHtml || '<span style="color:var(--text-faint)">Keine Angabe</span>'}</div>
      ${cardContact(e)}
    </div>`;
}

// ── Grouping columns ──────────────────────────────────────────────
function renderColumns(board, defs, keyFn, cardBodyFn, hideRegion=false) {
  board.innerHTML = `<div class="columns">${
    defs.map(def => {
      const matches = daten.filter(e => keyFn(e, def));
      return `
        <div class="column col-${def.color}">
          <div class="column-header">
            <span>${esc(def.name)}</span>
            <span class="count">${matches.length}</span>
          </div>
          ${matches.length
            ? matches.map(e => makeCard(e, cardBodyFn(e), '', hideRegion)).join('')
            : `<p class="empty" style="padding:1.5rem 0;">Keine Einträge</p>`}
        </div>`;
    }).join('')
  }</div>`;
}

// ── Single-item tab ────────────────────────────────────────────────
function renderSingle(board, key, label, accent) {
  const items = daten.filter(e => e[key] && e[key].trim());
  if (!items.length) {
    board.innerHTML = `<p class="empty">Noch keine Einträge für „${label}".</p>`;
    return;
  }
  board.innerHTML = `<div class="cards-grid accent-${accent}">${
    items.map(e => makeCard(e, esc(e[key]))).join('')
  }</div>`;
}

// ── Tab renderers ──────────────────────────────────────────────────
function render() {
  const board = document.getElementById('board');
  if (!daten.length) {
    board.innerHTML = `<p class="empty">Noch keine Projektangaben eingegangen.</p>`;
    return;
  }

  if (activeTab === 'themen') {
    renderColumns(board, THEMEN_DEF,
      (e, def) => list(e.themen).includes(def.name),
      e => esc(e.fokus)
    );
    return;
  }

  if (activeTab === 'zielgruppe') {
    renderColumns(board, ZG_DEF,
      (e, def) => list(e.zielgruppe).includes(def.name),
      e => esc(e.fokus)
    );
    return;
  }

  if (activeTab === 'region') {
    const regionen = {};
    daten.forEach(e => {
      const r = e.region && e.region.trim() ? e.region.trim() : 'Ohne Angabe';
      (regionen[r] = regionen[r]||[]).push(e);
    });
    const namen = Object.keys(regionen).sort((a,b) =>
      a==='Ohne Angabe'?1:b==='Ohne Angabe'?-1:a.localeCompare(b,'de'));
    const defs = namen.map((r,i) => ({ name: r, color: COLOR_CYCLE[i%COLOR_CYCLE.length], _key: r }));
    renderColumns(board, defs,
      (e, def) => (e.region&&e.region.trim()?e.region.trim():'Ohne Angabe') === def.name,
      e => esc(e.fokus),
      true
    );
    return;
  }

  if (activeTab === 'stand') {
    const defs = [
      { name: PROGRAMMLINIE_LABELS.AB, color: 'blue',   code: 'AB' },
      { name: PROGRAMMLINIE_LABELS.BC, color: 'orange', code: 'BC' },
      { name: 'Ohne Angabe', color: 'gray', code: null },
    ];
    renderColumns(board, defs,
      (e, def) => {
        const raw = e.stand && e.stand.trim() ? e.stand.trim() : null;
        const s = (raw === 'AB' || raw === 'BC') ? raw : null;
        return s === def.code;
      },
      e => esc(e.fokus)
    );
    return;
  }

  if (activeTab === 'fokus')        { renderSingle(board, 'fokus',        'Fokus',              'blue');   return; }
  if (activeTab === 'begeisterung') { renderSingle(board, 'begeisterung', 'Was begeistert mich', 'teal');   return; }
  if (activeTab === 'veraenderung') { renderSingle(board, 'veraenderung', 'Mehrwert bisher',     'pink');   return; }
  if (activeTab === 'veraenderungZiel') { renderSingle(board, 'veraenderungZiel', 'Wirkung am Projektende', 'blue'); return; }
  if (activeTab === 'gelingen')     { renderSingle(board, 'gelingen',     'Gelingensfaktoren',  'green');  return; }
  if (activeTab === 'hindernisse') { renderSingle(board, 'hindernisse','Hemmende Faktoren',  'orange'); return; }
  if (activeTab === 'geheimtipp')  { renderSingle(board, 'geheimtipp', 'Geheimtipps',           'purple'); return; }
  if (activeTab === 'suche')       { renderSingle(board, 'suche',      'Wonach suche ich',      'teal');   return; }
  if (activeTab === 'biete')       { renderSingle(board, 'biete',      'Was ich anbiete',       'pink');   return; }

  if (activeTab === 'uebersicht') {
    const cards = daten.map(e => {
      const themen = list(e.themen).map(t => t==='Sonstiges'&&e.themenSonstiges?e.themenSonstiges:t);
      const zg     = list(e.zielgruppe).map(z => z==='Sonstiges'&&e.zielgruppeSonstiges?e.zielgruppeSonstiges:z);
      const col = (THEMEN_DEF.find(t => list(e.themen).includes(t.name)) || {color:'gray'}).color;
      const tagHtml = themen.length
        ? `<div class="tags">${themen.map(t=>`<span class="tag" style="background:var(--${col}-light);color:var(--${col})">${esc(t)}</span>`).join('')}</div>`
        : '';
      const zgLine = zg.length ? `<p style="font-size:12px;color:var(--text-faint);margin-top:0.3rem;">Zielgruppe: ${esc(zg.join(', '))}</p>` : '';
      const body = [
        e.fokus       ? `<p><strong style="font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em">Fokus</strong><br>${esc(e.fokus)}</p>` : '',
        e.begeisterung ? `<p style="margin-top:.6rem"><strong style="font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em">Was begeistert mich</strong><br>${esc(e.begeisterung)}</p>` : '',
        e.veraenderung ? `<p style="margin-top:.6rem"><strong style="font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em">Mehrwert bisher</strong><br>${esc(e.veraenderung)}</p>` : '',
        e.veraenderungZiel ? `<p style="margin-top:.6rem"><strong style="font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em">Wirkung am Projektende</strong><br>${esc(e.veraenderungZiel)}</p>` : '',
        e.gelingen    ? `<p style="margin-top:.6rem"><strong style="font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em">Gelingensfaktoren</strong><br>${esc(e.gelingen)}</p>` : '',
        e.hindernisse ? `<p style="margin-top:.6rem"><strong style="font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em">Hemmende Faktoren</strong><br>${esc(e.hindernisse)}</p>` : '',
        e.geheimtipp  ? `<p style="margin-top:.6rem"><strong style="font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em">Geheimtipp</strong><br>${esc(e.geheimtipp)}</p>` : '',
        e.suche       ? `<p style="margin-top:.6rem"><strong style="font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em">Wonach suche ich</strong><br>${esc(e.suche)}</p>` : '',
        e.biete       ? `<p style="margin-top:.6rem"><strong style="font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em">Was ich anbiete</strong><br>${esc(e.biete)}</p>` : '',
      ].filter(Boolean).join('');
      return `<div class="card" style="border-left:3px solid var(--${col});margin-bottom:.75rem;break-inside:avoid">
        ${cardHead(e)}
        ${tagHtml}
        ${zgLine ? `<div style="padding:0 1rem .5rem">${zgLine}</div>` : ''}
        <div class="card-body">${body||'<span style="color:var(--text-faint)">Keine weiteren Angaben</span>'}</div>
      </div>`;
    }).join('');
    board.innerHTML = `<div class="cards-grid">${cards}</div>`;
    return;
  }

  if (activeTab === 'kontakte') {
    const mitEinverstaendnis = daten.filter(e => e.einverstaendnisKontakt === 'ja');
    const hint = '<p style="font-size:12px;color:var(--text-faint);margin-bottom:1rem;">Nur Projektnamen, Ansprechpersonen und Mailadressen – ohne Verknüpfung zu inhaltlichen Angaben. Zur direkten Kontaktaufnahme auf der Tagung.</p>';
    const cards = mitEinverstaendnis.map(e => `
      <div class="card" style="border-left:3px solid var(--blue);margin-bottom:.75rem;break-inside:avoid">
        <div class="card-head">
          <p class="card-project">${esc(e.projekt)}</p>
          <p class="card-meta">${esc(e.region)||'Region nicht angegeben'}</p>
        </div>
        ${cardContactFull(e)}
      </div>`).join('');
    if (!mitEinverstaendnis.length) { board.innerHTML = hint + '<p class="empty">Noch keine Projekte haben der Anzeige ihrer Kontaktdaten zugestimmt.</p>'; return; }
    board.innerHTML = hint + `<div class="cards-grid">${cards}</div>`;
    return;
  }
}

async function laden() {
  try {
    const res = await fetch(SHEET_URL + '?t=' + Date.now());
    const neu = await res.json();
    const neuJson = JSON.stringify(neu);
    const now = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    if (neuJson !== letzterStand) {
      letzterStand = neuJson;
      daten = neu;
      render();
    }
    document.getElementById('livetext').textContent =
      `Zuletzt gepr\u00FCft: ${now} \u00B7 ${daten.length} Projekt${daten.length!==1?'e':''}`;
  } catch(e) {
    document.getElementById('livetext').textContent = 'Verbindungsfehler';
  }
}

laden();
setInterval(laden, 15000);
</script>
</body>
</html>
